<!DOCTYPE html>
<html lang="ku">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Happy Birthday</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

background:
url("birthday-bg.png");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

overflow:hidden;

font-family:
Segoe UI;

}

/* smaller lower button */

button{

position:absolute;

left:50%;

top:60%;

transform:
translate(-50%,-50%);

padding:

18px 40px;

font-size:

18px;

font-weight:700;

border:none;

border-radius:

999px;

background:

linear-gradient(
180deg,
#ff66b7,
#ff2d84
);

color:white;

cursor:pointer;

box-shadow:

0 10px 25px
rgba(255,0,120,.35);

letter-spacing:

0px;

transition:.3s;

}

button:hover{

transform:

translate(-50%,-50%)
scale(1.05);

}

.message{

display:none;

position:absolute;

inset:0;

background:

rgba(
255,
240,
247,
.92
);

overflow:auto;

padding:

70px 40px;

text-align:center;

font-size:

28px;

line-height:

2;

color:

#8a003d;

}

.title{

font-size:

52px;

font-weight:

700;

letter-spacing:

0px;

color:

#ff2f84;

margin-bottom:

30px;

}

p{

margin-bottom:

18px;

}

</style>

</head>

<body>

<button onclick="showMessage()">

A message for you 🤍

</button>

<div
class="message"
id="message">

<div class="title">

Happy BirthDay to you🎉❤️🤍

</div>

<p>
ڕۆژی لە دایکبوونت پیرۆز بێت🤍
</p>

<p>
تەمەنت پرڕ بەرەکەت بێت هەموو ڕۆژێکت هەر شادی وخۆشی بێت
</p>

<p>
دووربی لە هەموو ناخۆشی و بەڵایەک
</p>

<p>
ئەو تەمەنەی ماوتە لە پێناو خودا بەسەری ببەی
</p>

<p>
ئەوەی باشە و خێری تێدایە خودا بێنێتە ڕێگات
</p>

<p>
دوبارە ڕۆژی لە دایک بوونت پیرۆز بێت🎉❤️🥰
</p>

</div>

<script>

function showMessage(){

document
.getElementById(
"message"
)
.style
.display=
"block";

}

</script>

</body>

</html>
